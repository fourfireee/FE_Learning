<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HTML 表单与资源加载示例</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" defer></script>
  </head>
  <body>
    <header class="page-header">
      <h1>HTML 表单与资源加载示例</h1>
      <p>这个页面演示 HTML 如何表达结构，CSS 如何负责样式，JavaScript 如何负责行为。</p>
    </header>

    <main class="layout">
      <!-- aria-labelledby 指向某个元素的 id，把那个元素的文字当作本区域的“名字”，
           读屏软件读到这个 section 时会念出“滤镜参数”，让用户知道这块是干什么的。
           这里指向下面 h2 的 id="form-title"。 -->
      <section class="panel" aria-labelledby="form-title">
        <h2 id="form-title">滤镜参数</h2>

        <form id="effect-form">
          <label>
            图片名称
            <input name="imageName" value="demo-image" required>
          </label>

          <label>
            滤镜类型
            <select name="filter">
              <option value="grayscale">灰度</option>
              <option value="blur">模糊</option>
              <option value="sharpen">锐化</option>
            </select>
          </label>

          <label>
            强度
            <input name="strength" type="range" min="0" max="100" value="60">
          </label>

          <button type="submit">生成配置</button>
        </form>
      </section>

      <section class="panel" aria-labelledby="result-title">
        <h2 id="result-title">生成结果</h2>
        <!-- pre(preformatted)：预格式化文本，会原样保留空格和换行，并用等宽字体显示，
             适合展示代码、JSON 等需要保持排版的内容（普通标签会把连续空格和换行折叠掉）。
             aria-live="polite"：把这块标记为“动态区域”，当 JS 往里写入新内容时，
             读屏软件会自动朗读出来；polite 表示“不打断用户，等空闲了再念”
             （对应的 assertive 则会立刻打断）。 -->
        <pre id="result" aria-live="polite"></pre>
      </section>
    </main>
  </body>
</html>
